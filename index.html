<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f3ede7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>番茄时钟</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dokdo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 日期 -->
        <header class="date-header">
            <div class="date-line" id="date-display"></div>
            <button class="auth-btn" id="auth-btn" title="登录同步数据"><svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="10" cy="6" rx="4" ry="4.2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/><path d="M5.5 11c-1 2-1.5 4-1 6.5.1.3.4.5.7.5h9.6c.3 0 .6-.2.7-.5.5-2.5 0-4.5-1-6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/></svg></button>
        </header>

        <!-- Tab 视图：计时器 -->
        <div class="tab-view" id="tab-timer">

        <!-- 计时器 -->
        <section class="timer-section">
            <div class="mode-badge" id="mode-badge">Focus</div>
            <div class="timer-ring" id="timer-ring">
                <div class="timer-time" id="timer">25:00</div>
            </div>
            <!-- 操作区：保持高度稳定，避免页面抖动 -->
            <div class="timer-actions" id="timer-actions">
            <!-- 任务类型选择（空闲时可见，按钮由 JS 动态渲染） -->
            <div class="task-type-section" id="task-type-section">
                <div class="task-type-label">请选择专注类型</div>
                <div class="task-type-row" id="task-type-row"></div>
                <input type="text" class="task-note-input" id="task-note-input" placeholder="添加备注（可选）…" maxlength="50">
                <button class="btn-primary btn-start-focus" id="btn-start-focus">开始专注</button>
            </div>
            <!-- 专注中类型指示（运行中可见） -->
            <div class="focus-type-indicator" id="focus-type-indicator" style="display:none;"></div>
            <div class="controls" id="controls" style="display:none;">
                <button class="btn-primary" id="start-pause-btn">暂停</button>
                <button class="btn-secondary" id="reset-btn">重置</button>
            </div>
            </div><!-- /timer-actions -->
            <div class="persist-indicator" id="persist-indicator"></div>
        </section>

        <!-- 今日统计 -->
        <section class="stats-section">
            <div class="stat-item">
                <span class="stat-label">今日专注</span>
                <span class="stat-value" id="today-count">0</span>
                <span class="stat-unit">个番茄钟</span>
            </div>
        </section>

        </div><!-- /tab-timer -->

        <!-- Tab 视图：日历 -->
        <div class="tab-view" id="tab-calendar" style="display:none;">

        <!-- 月历统计 -->
        <div class="calendar-stats" id="calendar-stats">
            <div class="cal-stat-item">
                <span class="cal-stat-value" id="cal-stat-days">0</span>
                <span class="cal-stat-label">本月专注天数</span>
            </div>
            <div class="cal-stat-item">
                <span class="cal-stat-value" id="cal-stat-avg-pomos">0</span>
                <span class="cal-stat-label">日均番茄钟</span>
            </div>
        </div>

        <!-- 月历 -->
        <section class="calendar-section">
            <div class="calendar-header">
                <button class="cal-nav" id="cal-prev">&lsaquo;</button>
                <span class="cal-month" id="cal-month-label"></span>
                <button class="cal-nav" id="cal-next">&rsaquo;</button>
            </div>
            <div class="calendar-grid">
                <div class="weekday-row" id="weekday-row"></div>
                <div class="days-row" id="days-grid"></div>
            </div>
        </section>

        </div><!-- /tab-calendar -->

        <!-- 底部 Tab 栏 -->
        <nav class="tab-bar">
            <button class="tab-btn active" data-tab="timer">计时</button>
            <button class="tab-btn" data-tab="calendar">日历</button>
        </nav>
    </div>

    <!-- 顶部通知卡片 -->
    <div id="toast">
        <div class="toast-icon">🍅</div>
        <div class="toast-body">
            <div class="toast-title">番茄时钟</div>
            <div class="toast-message" id="notify-message">时间到！</div>
        </div>
        <button class="toast-close" id="toast-close-btn" aria-label="关闭">✕</button>
    </div>

    <!-- 日期详情浮窗 -->
    <div id="day-detail">
        <div class="detail-header">
            <div class="detail-date" id="detail-date"></div>
            <div class="detail-count" id="detail-count"></div>
        </div>
        <div class="detail-periods" id="detail-periods">
            <!-- 凌晨 -->
            <div class="period-block" data-period="凌晨">
                <div class="period-header">
                    <span class="period-label">凌晨</span>
                    <span class="period-count">0:00 – 5:59</span>
                </div>
                <div class="period-list" id="period-dawn"></div>
            </div>
            <!-- 上午 -->
            <div class="period-block" data-period="上午">
                <div class="period-header">
                    <span class="period-label">上午</span>
                    <span class="period-count">6:00 – 12:00</span>
                </div>
                <div class="period-list" id="period-morning"></div>
            </div>
            <!-- 下午 -->
            <div class="period-block" data-period="下午">
                <div class="period-header">
                    <span class="period-label">下午</span>
                    <span class="period-count">12:00 – 18:00</span>
                </div>
                <div class="period-list" id="period-afternoon"></div>
            </div>
            <!-- 晚间 -->
            <div class="period-block" data-period="晚间">
                <div class="period-header">
                    <span class="period-label">晚间</span>
                    <span class="period-count">18:00 – 次日 0:00</span>
                </div>
                <div class="period-list" id="period-evening"></div>
            </div>
        </div>
        <div class="detail-footer">
            <button class="detail-add-btn" id="detail-add-btn">+ 补记录番茄钟</button>
        </div>
    </div>

    <!-- Auth 登录弹窗 -->
    <div class="auth-overlay" id="auth-overlay">
        <div class="auth-modal">
            <button class="auth-close" id="auth-close">&times;</button>
            <!-- 未登录 -->
            <div id="auth-form-section">
                <div class="auth-tabs">
                    <button class="auth-tab active" id="auth-tab-login">登录</button>
                    <button class="auth-tab" id="auth-tab-register">注册</button>
                </div>
                <form id="auth-form">
                    <input class="auth-input" type="email" id="auth-email" placeholder="邮箱地址" required autocomplete="email">
                    <input class="auth-input" type="text" id="auth-display-name" placeholder="昵称（可选）" maxlength="20" autocomplete="name" style="display:none;">
                    <input class="auth-input" type="password" id="auth-password" placeholder="密码（至少6位）" required minlength="6" autocomplete="current-password">
                    <div class="auth-error" id="auth-error"></div>
                    <button class="auth-submit" type="submit" id="auth-submit">登录</button>
                </form>
            </div>
            <!-- 已登录 -->
            <div id="auth-logged-in" style="display:none;">
                <div class="auth-avatar" id="auth-avatar"></div>
                <div class="auth-name-row" id="auth-name-row">
                    <span class="auth-display-name" id="auth-display-name-text" title="点击修改昵称"></span>
                    <input class="auth-input auth-name-edit-input" id="auth-name-edit-input" maxlength="20" placeholder="输入昵称" style="display:none;">
                </div>
                <div class="auth-user-email" id="auth-user-email"></div>
                <div class="auth-sync-status" id="auth-sync-status">已同步 ✓</div>
                <button class="auth-submit" id="auth-force-sync">立即同步</button>
                <button class="auth-submit secondary" id="auth-logout">退出登录</button>
            </div>
        </div>
    </div>

    <!-- 专注类型管理弹窗 -->
    <div class="type-mgr-overlay" id="type-mgr-overlay">
        <div class="type-mgr-modal">
            <h2 class="type-mgr-title">专注类型管理</h2>
            <div class="type-mgr-list" id="type-mgr-list"></div>
            <div class="type-mgr-add-row">
                <input type="text" class="type-mgr-add-input" id="type-mgr-add-input" placeholder="新类型名称…" maxlength="10">
                <button class="type-mgr-add-btn" id="type-mgr-add-btn">添加</button>
            </div>
            <button class="type-mgr-done-btn" id="type-mgr-done-btn">完成</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
